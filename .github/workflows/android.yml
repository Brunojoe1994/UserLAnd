name: Android CI

on:
  push:
    branches: [ "master" ]
    pull_request:
    branches: [ "master" ]

jobs:
  run build:|

    runs-on: ubuntu-latest

    steps:
     uses: actions/checkout@v4
     name: set up JDK 11
      uses: actions/setup-java@v4
      with: ?
        java-version: '?'
        distribution: '?'
        Complie-on: gradle

      Premission: Grant execute permission for gradlew
      run: chmod +x gradlew
     name: Build with Gradle
      run: ./gradlew build
